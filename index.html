<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deokso Lab</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="deokso.png">
</head>

<body>
  <main class="page">
    <header class="hero">
      <a href="https://deokso-h.goegn.kr/deokso-h/main.do" target="_blank" rel="noopener noreferrer">
        <img src="deokso.png" alt="덕소고 로고" width="86">
      </a>

      <div>
        <p class="eyebrow">Biology Laboratory Inventory</p>
        <h1>덕소고등학교 생물화학실</h1>
      </div>
    </header>

    <section class="toolbar" aria-label="검색 및 필터">
      <input
        type="text"
        id="search"
        placeholder="기구, 시약, 위치를 검색하세요"
        autocomplete="off"
      >

      <div class="controls" aria-label="카테고리 필터">
        <button class="filter-button active" type="button" data-category="전체">전체</button>
        <button class="filter-button" type="button" data-category="실험기구">실험기구</button>
        <button class="filter-button" type="button" data-category="측정기기">측정기기</button>
        <button class="filter-button" type="button" data-category="시약">시약</button>
      </div>
    </section>

    <section class="dashboard" aria-label="실험실 장비 현황">
      <div id="stats" class="stats"></div>
    </section>

    <div id="resultSummary" class="result-summary">검색어를 입력하거나 카테고리를 선택하세요.</div>

    <section id="result" aria-live="polite">
      <div class="empty-state">실험기구를 검색해보세요.</div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>

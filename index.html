<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Deokso-Lab</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="/deokso.png">
  <script src="script.js"></script>
</head>

<body>
<div id="adminControls">
  <button id="adminBtn" onclick="openModal()">관리자</button>
  <button id="logoutBtn" onclick="logout()">로그아웃</button>
</div>
<a href="https://deokso-h.goegn.kr/deokso-h/main.do" target="_blank" rel="noopener noreferrer">
  <img src="deokso.png" alt="덕소고사진" id="icon">
</a>
<h1>덕소고등학교 생물화학실</h1>
<div id="adminStatus" class="admin-status">관리자 상태: 로그아웃</div>
<p>실험도구 설명 및 사용법</p>


<div id="loginModal" class="modal">
  <div class="modal-content">
    <span onclick="closeModal()" class="close">&times;</span>
    <h3>관리자 로그인</h3>
    <input type="password" id="pw" placeholder="Password">
    <button onclick="login()">로그인</button>
  </div>
</div>


<div id="editor">
  <h3>게시글 작성</h3>
  <textarea id="content" placeholder="게시글 작성"></textarea><br>
  <label for="imageInput" class="fileBtn">이미지 업로드</label>
  <input type="file" id="imageInput">
  <span id="fileName">선택된 파일 없음</span>
  <div id="imagePreview" class="image-preview"></div>
  <button onclick="addPost()">게시</button>
  <div id="backupTools" class="backup-tools">
    <button type="button" onclick="exportPosts()">백업 다운로드</button>
    <label for="backupInput" class="fileBtn">백업 복원</label>
    <input type="file" id="backupInput" accept="application/json,.json">
  </div>
</div>

<hr>

<input type="search" id="searchInput" class="search-input" placeholder="게시물 찾기">


<div id="posts"></div>

<div id="cardViewer" class="card-viewer" onclick="closeCardViewer()">
  <div class="card-viewer-content" onclick="event.stopPropagation()"></div>
</div>


</body>
</html>
